<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Simple Notes</title>
    <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
<div class="container">

    <header>
        <h1>Simple Notes — Ad-Free by Choice</h1>
        <p>Your support keeps it that way.</p>
    </header>

    <!-- CRYPTO -->
    <section class="section">
        <h2>Crypto</h2>
        <div class="crypto-cards">

            <div class="crypto-card">
                <div class="qr">
                    <!-- Replace btc.png with a real QR code image -->
                    <div class="qr-placeholder">QR<br>BTC</div>
                </div>
                <div class="crypto-info">
                    <div class="crypto-name">Bitcoin (BTC)</div>
                    <div class="crypto-address" id="addr-btc">YOUR_BTC_ADDRESS</div>
                    <button class="btn-copy" onclick="copyAddress('addr-btc', this)">Copy</button>
                </div>
            </div>

            <div class="crypto-card">
                <div class="qr">
                    <!-- Replace eth.png with a real QR code image -->
                    <div class="qr-placeholder">QR<br>ETH</div>
                </div>
                <div class="crypto-info">
                    <div class="crypto-name">Ethereum (ETH)</div>
                    <div class="crypto-address" id="addr-eth">YOUR_ETH_ADDRESS</div>
                    <button class="btn-copy" onclick="copyAddress('addr-eth', this)">Copy</button>
                </div>
            </div>

            <div class="crypto-card">
                <div class="qr">
                    <!-- Replace xmr.png with a real QR code image -->
                    <div class="qr-placeholder">QR<br>XMR</div>
                </div>
                <div class="crypto-info">
                    <div class="crypto-name">Monero (XMR)</div>
                    <div class="crypto-address" id="addr-xmr">YOUR_XMR_ADDRESS</div>
                    <button class="btn-copy" onclick="copyAddress('addr-xmr', this)">Copy</button>
                </div>
            </div>

        </div>
    </section>

    <!-- FIAT -->
    <section class="section">
        <h2>Fiat</h2>
        <div class="fiat-buttons">
            <a class="btn-fiat" href="YOUR_PATRONITE_URL" target="_blank" rel="noopener">Patronite</a>
            <a class="btn-fiat" href="YOUR_KOFI_URL" target="_blank" rel="noopener">Ko-fi ☕</a>
        </div>
    </section>

    <footer>
        <p>Thank you! Every contribution helps keep Simple Notes free and private.</p>
    </footer>

</div>

<script>
function copyAddress(id, btn) {
    const text = document.getElementById(id).textContent.trim();
    navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
        }, 2000);
    });
}
</script>
</body>
</html>
